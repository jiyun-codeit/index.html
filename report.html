<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>출결 보고 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f7f7f5;
  min-height: 100vh;
  padding: 2rem 1rem;
}
.wrap { max-width: 680px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.2rem; }
h1 { font-size: 16px; font-weight: 600; color: #1a1a1a; display: flex; align-items: center; gap: 8px; }
.card {
  background: #fff;
  border: 1px solid #e5e5e3;
  border-radius: 12px;
  padding: 1.25rem 1.4rem;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.card-title { font-size: 13px; font-weight: 600; color: #6b6b6b; text-transform: uppercase; letter-spacing: 0.05em; }
textarea {
  width: 100%;
  min-height: 120px;
  font-size: 12px;
  padding: 10px 12px;
  border: 1px solid #d9d9d6;
  border-radius: 8px;
  background: #fafafa;
  resize: vertical;
  outline: none;
  font-family: monospace;
  color: #1a1a1a;
  transition: border-color 0.15s;
}
textarea:focus { border-color: #8b7cf8; }
textarea.small { min-height: 60px; font-family: inherit; font-size: 13px; }
.upload-area {
  border: 2px dashed #d9d9d6;
  border-radius: 8px;
  padding: 1.2rem;
  text-align: center;
  cursor: pointer;
  color: #aaa;
  font-size: 13px;
  transition: border-color 0.15s, background 0.15s;
}
.upload-area:hover { border-color: #8b7cf8; background: #f9f8ff; color: #8b7cf8; }
.upload-area input { display: none; }
.row { display: flex; gap: 8px; flex-wrap: wrap; }
.btn {
  font-size: 13px;
  padding: 9px 18px;
  border-radius: 8px;
  border: 1px solid #d9d9d6;
  background: #fff;
  color: #1a1a1a;
  cursor: pointer;
  transition: background 0.12s;
}
.btn:hover { background: #f2f2f0; }
.btn-purple { background: #8b7cf8; color: #fff; border-color: #8b7cf8; }
.btn-purple:hover { background: #7a6be0; }
.btn-sm { font-size: 12px; padding: 6px 12px; }
.settings-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  font-size: 13px;
  color: #555;
  align-items: flex-start;
}
.settings-row label { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.settings-row label.stack { flex-direction: column; align-items: flex-start; gap: 4px; }
.settings-row input[type="time"],
.settings-row input[type="date"] {
  font-size: 13px;
  padding: 4px 8px;
  border: 1px solid #d9d9d6;
  border-radius: 6px;
  background: #fafafa;
  outline: none;
}
.settings-row input[type="text"],
.settings-row input[type="number"] {
  font-size: 13px;
  padding: 4px 8px;
  border: 1px solid #d9d9d6;
  border-radius: 6px;
  background: #fafafa;
  outline: none;
}
.divider { height: 1px; background: #e5e5e3; }
.report-tabs { display: flex; gap: 6px; }
.tab {
  font-size: 13px;
  padding: 7px 16px;
  border-radius: 8px 8px 0 0;
  border: 1px solid #e5e5e3;
  border-bottom: none;
  background: #f7f7f5;
  color: #999;
  cursor: pointer;
}
.tab.active { background: #fff; color: #1a1a1a; font-weight: 600; }
.report-box {
  background: #f7f7f5;
  border: 1px solid #e5e5e3;
  border-radius: 0 10px 10px 10px;
  padding: 1rem 1.1rem;
  font-size: 13px;
  line-height: 1.9;
  color: #1a1a1a;
  white-space: pre-wrap;
  word-break: keep-all;
  min-height: 80px;
  font-family: inherit;
}
.copy-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.copy-done { font-size: 12px; color: #22a06b; opacity: 0; transition: opacity 0.3s; }
.status-bar { font-size: 12px; color: #888; padding: 6px 0; }
.status-bar.ok { color: #22a06b; }
.status-bar.err { color: #e5534b; }
.col-map {
  display: none;
  flex-direction: column;
  gap: 8px;
  background: #f7f7f5;
  border: 1px solid #e5e5e3;
  border-radius: 8px;
  padding: 10px 12px;
  font-size: 12px;
  color: #555;
}
.col-map.show { display: flex; }
.col-map-row { display: flex; align-items: center; gap: 8px; }
.col-map-row label { min-width: 80px; }
.col-map-row input {
  width: 60px;
  font-size: 12px;
  padding: 4px 8px;
  border: 1px solid #d9d9d6;
  border-radius: 6px;
  text-align: center;
  background: #fff;
  outline: none;
}
.hint { font-size: 11px; color: #aaa; }
</style>
</head>
<body>
<div class="wrap">
  <h1>
    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b7cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    출결 보고 생성기
  </h1>

  <!-- 기준 설정 -->
  <div class="card">
    <div class="card-title">기준 설정</div>
    <div class="settings-row">
      <label>과정명 <input type="text" id="course-name" placeholder="예) DA" style="width:100px;" /></label>
      <label>기수 <input type="number" id="course-gen" placeholder="13" style="width:60px;" min="1" /> 기</label>
      <label>날짜 <input type="date" id="report-date" /></label>
      <label>지각 기준 <input type="time" id="late-threshold" value="09:11" /></label>
      <label>조퇴 기준 <input type="time" id="early-leave-threshold" value="18:50" /></label>
    </div>
    <div class="divider"></div>
    <div class="settings-row">
      <label class="stack" style="gap:8px;">
        출석입력요청 검토 결과
        <label style="gap:6px;">검토 대상 <input type="number" id="review-count" value="0" style="width:55px;" min="0" /></label>
        <label style="gap:6px;">검토 결과 <input type="text" id="review-result" value="이상 없음" style="width:160px;" /></label>
      </label>
    </div>
  </div>

  <!-- 데이터 입력 -->
  <div class="card">
    <div class="card-title">출결 데이터 입력</div>
    <label class="upload-area" for="file-input">
      <input type="file" id="file-input" accept=".xlsx,.xls" onchange="handleFile(event)" />
      📂 xlsx 파일 클릭하여 업로드
    </label>
    <div style="text-align:center;font-size:12px;color:#aaa;">또는</div>
    <textarea id="paste-area" placeholder="엑셀에서 전체 선택(Ctrl+A) → 복사(Ctrl+C) 후 여기에 붙여넣기 (Ctrl+V)"></textarea>

    <div id="col-map" class="col-map">
      <div style="font-weight:600;margin-bottom:4px;">열 번호 수동 설정 (0부터 시작)</div>
      <div class="col-map-row"><label>성명</label><input id="col-name" type="number" value="1" min="0" /></div>
      <div class="col-map-row"><label>훈련상태</label><input id="col-status" type="number" value="5" min="0" /></div>
      <div class="col-map-row"><label>출결상태</label><input id="col-attend" type="number" value="6" min="0" /></div>
      <div class="col-map-row"><label>입실시각</label><input id="col-entry" type="number" value="7" min="0" /></div>
      <div class="col-map-row"><label>퇴실시각</label><input id="col-exit" type="number" value="8" min="0" /></div>
      <div class="col-map-row"><label>외출시작</label><input id="col-out-start" type="number" value="9" min="0" /></div>
      <div class="col-map-row"><label>외출복귀</label><input id="col-out-end" type="number" value="10" min="0" /></div>
      <div class="col-map-row"><label>휴공가상태</label><input id="col-leave-status" type="number" value="12" min="0" /></div>
    </div>

    <div class="row">
      <button class="btn btn-purple" onclick="analyze()">분석하기</button>
      <button class="btn btn-sm" onclick="toggleColMap()">열 번호 수동 설정</button>
      <button class="btn btn-sm" onclick="clearAll()">초기화</button>
    </div>
    <div id="status-bar" class="status-bar"></div>
  </div>

  <!-- 보고 출력 -->
  <div class="card" id="report-card" style="display:none;">
    <div class="card-title">보고 멘트</div>
    <div class="report-tabs">
      <div class="tab active" onclick="switchTab('morning')">오전 보고</div>
      <div class="tab" onclick="switchTab('afternoon')">오후 보고</div>
      <div class="tab" onclick="switchTab('final')">최종 보고</div>
    </div>
    <div class="report-box" id="report-text"></div>
    <div class="copy-row">
      <button class="btn btn-sm" onclick="copyReport()">복사하기</button>
      <span class="copy-done" id="copy-done">복사됨!</span>
    </div>
  </div>
</div>

<script>
let reports = { morning:'', afternoon:'', final:'' };
let activeTab = 'morning';

// 날짜 기본값 = 오늘
(function() {
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('report-date').value = `${y}-${m}-${d}`;
})();

// ── 파일 업로드 ──────────────────────────────────────────
function handleFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const wb = XLSX.read(ev.target.result, { type: 'array' });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const raw = XLSX.utils.sheet_to_csv(ws, { FS: '\t' });
    document.getElementById('paste-area').value = raw;
    setStatus('파일 로드 완료. 분석하기를 눌러주세요.', 'ok');
  };
  reader.readAsArrayBuffer(file);
}

function parseRows(text) {
  return text.trim().split('\n').map(r => r.split('\t').map(c => c.trim()));
}

function isEmpty(v) {
  return !v || v === '-' || v === '' || v === 'null' || v === 'undefined';
}

function autoDetectCols(rows) {
  const map = { name:-1, status:-1, attend:-1, entry:-1, exit:-1, outStart:-1, outEnd:-1 };
  // xlsx→CSV 변환 시 셀 안 개행으로 행이 쪼개짐 → 최소 열 번호 제약으로 오탐 방지
  rows.slice(0, 15).forEach(row => {
    row.forEach((cell, i) => {
      const c = (cell||'').replace(/[\s\n"]/g,'');
      if (c === '성명'    && map.name    === -1)           map.name    = i;
      if (c === '상태'    && map.status  === -1 && i >= 4) map.status  = i;
      if (c === '출결상태' && map.attend  === -1 && i >= 4) map.attend  = i;
      if (c.includes('입실') && map.entry   === -1 && i >= 5) map.entry   = i;
      if (c.includes('퇴실') && map.exit    === -1 && i >= 5) map.exit    = i;
      if (c.includes('시작') && map.outStart === -1 && i > Math.max(map.exit, 7)) map.outStart = i;
      if (c.includes('복귀') && map.outEnd   === -1 && i >= 7) map.outEnd  = i;
    });
  });
  return map;
}

function parseTime(s) {
  if (isEmpty(s)) return null;
  const m = s.match(/(\d{1,2}):(\d{2})/);
  return m ? parseInt(m[1]) * 60 + parseInt(m[2]) : null;
}
function timeToMin(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}
function fmtTime(s) {
  if (isEmpty(s)) return '';
  const m = s.match(/(\d{1,2}:\d{2})/);
  return m ? m[1] : s;
}

// ── 분석 ──────────────────────────────────────────────────
function analyze() {
  const text = document.getElementById('paste-area').value.trim();
  if (!text) { setStatus('데이터를 먼저 입력해주세요.', 'err'); return; }

  const rows = parseRows(text);
  const detected = autoDetectCols(rows);

  const c = {
    name:     detected.name     >= 0 ? detected.name     : parseInt(document.getElementById('col-name').value),
    status:   detected.status   >= 0 ? detected.status   : parseInt(document.getElementById('col-status').value),
    attend:   detected.attend   >= 0 ? detected.attend   : parseInt(document.getElementById('col-attend').value),
    entry:    detected.entry    >= 0 ? detected.entry    : parseInt(document.getElementById('col-entry').value),
    exit:     detected.exit     >= 0 ? detected.exit     : parseInt(document.getElementById('col-exit').value),
    outStart: detected.outStart >= 0 ? detected.outStart : parseInt(document.getElementById('col-out-start').value),
    outEnd:      detected.outEnd   >= 0 ? detected.outEnd   : parseInt(document.getElementById('col-out-end').value),
    leaveStatus: parseInt(document.getElementById('col-leave-status').value),
  };

  // 열 번호 UI 업데이트
  document.getElementById('col-name').value     = c.name;
  document.getElementById('col-status').value   = c.status;
  document.getElementById('col-attend').value   = c.attend;
  document.getElementById('col-entry').value    = c.entry;
  document.getElementById('col-exit').value     = c.exit;
  document.getElementById('col-out-start').value = c.outStart;
  document.getElementById('col-out-end').value  = c.outEnd;

  const lateMin  = timeToMin(document.getElementById('late-threshold').value);
  const earlyMin = timeToMin(document.getElementById('early-leave-threshold').value);
  const course   = document.getElementById('course-name').value.trim();
  const gen      = document.getElementById('course-gen').value.trim();

  // 날짜
  const dateVal = document.getElementById('report-date').value;
  const DAY_NAMES = ['일','월','화','수','목','금','토'];
  let reportDate;
  if (dateVal) {
    const [y,m,d] = dateVal.split('-').map(Number);
    reportDate = new Date(y, m-1, d);
  } else {
    reportDate = new Date();
  }
  const dateStr = `${reportDate.getMonth()+1}/${reportDate.getDate()}(${DAY_NAMES[reportDate.getDay()]})`;
  const courseLabel = course
    ? `[${course}${gen ? `_${gen}기` : ''}] `
    : '';

  // 출석입력요청 검토
  const reviewCount  = parseInt(document.getElementById('review-count').value) || 0;
  const reviewResult = document.getElementById('review-result').value.trim() || '이상 없음';

  // 데이터 행 필터 — 헤더 제거(연번이 숫자) + 제적/수료 제외 + 휴공가 제외
  const exclude = ['중도탈락','조기취업','수료','훈련포기','자진퇴소'];
  const dataRows = rows.filter(r => {
    if (r.length <= c.name) return false;
    const name = r[c.name] || '';
    if (!name || name === '성명') return false;
    if (isNaN(parseInt(r[0]))) return false;
    const status = c.status >= 0 ? (r[c.status] || '') : '';
    return !exclude.some(ex => status.includes(ex));
  });

  if (dataRows.length === 0) {
    setStatus('⚠ 수강생 데이터를 찾지 못했어요. 열 번호를 수동으로 확인해주세요.', 'err');
    return;
  }

  const total = dataRows.length;

  // 수강생 분류
  const absent     = []; // { name }
  const late       = []; // { name, time }
  const earlyLeave = []; // { name, time }
  const outing     = []; // { name, startTime, endTime|null }
  const noExitQR   = []; // { name } — 입실 있으나 퇴실 없음
  const leaveList  = []; // 공가/휴가 자동 감지

  dataRows.forEach(r => {
    const name = r[c.name] || '';

    const entryRaw       = c.entry       >= 0 ? (r[c.entry]       || '') : '';
    const exitRaw        = c.exit        >= 0 ? (r[c.exit]        || '') : '';
    const outStartRaw    = c.outStart    >= 0 ? (r[c.outStart]    || '') : '';
    const outEndRaw      = c.outEnd      >= 0 ? (r[c.outEnd]      || '') : '';
    const leaveStatusRaw = c.leaveStatus >= 0 ? (r[c.leaveStatus] || '') : '';

    // 휴공가 자동 감지 (M열)
    const isLeave = ['공가','휴가'].some(kw => leaveStatusRaw.includes(kw));
    if (isLeave) {
      leaveList.push(`${name}(${leaveStatusRaw})`);
      return;
    }

    const entryMin    = parseTime(entryRaw);
    const exitMin     = parseTime(exitRaw);
    const outStartMin = parseTime(outStartRaw);
    const outEndMin   = parseTime(outEndRaw);

    // 결석: 입실시간 없으면 결석 (출결상태 칼럼 무시 — 입실시간 기준으로만 판단)
    const isAbsent = entryMin === null && isEmpty(entryRaw);

    if (isAbsent) {
      absent.push({ name });
    } else {
      // 지각
      if (entryMin !== null && entryMin >= lateMin) {
        late.push({ name, time: fmtTime(entryRaw) });
      }
      // 퇴실 QR 미촬영
      if (exitMin === null && isEmpty(exitRaw)) {
        noExitQR.push({ name });
      }
      // 조퇴
      if (exitMin !== null && exitMin < earlyMin) {
        earlyLeave.push({ name, time: fmtTime(exitRaw) });
      }
    }

    // 외출 — outStart에 실제 시간이 있을 때만
    if (outStartMin !== null) {
      outing.push({
        name,
        startTime: fmtTime(outStartRaw),
        endTime: outEndMin !== null ? fmtTime(outEndRaw) : null,
      });
    }
  });

  const presentCount = total - leaveList.length - absent.length;

  // ── 오전 보고 ──
  let morning = `${courseLabel}${dateStr} 오전 출결 현황 공유\n`;
  morning += `• 출석: ${presentCount}명\n`;
  const lateAbsentCount = absent.length + late.length;
  morning += `• 지각/미입실: ${lateAbsentCount}명`;
  if (lateAbsentCount > 0) {
    late.forEach(({ name, time }) => { morning += `\n  ◦ ${name}(지각 ${time})`; });
    absent.forEach(({ name }) => { morning += `\n  ◦ ${name}(미입실)`; });
  }
  morning += `\n• 휴공가: ${leaveList.length}명`;
  if (leaveList.length > 0) {
    leaveList.forEach(item => { morning += `\n  ◦ ${item}`; });
  }

  // ── 오후 보고 ──
  let afternoon = `${courseLabel}${dateStr} 오후 출결 현황 공유\n`;
  afternoon += `• ZEP 접속자: ${presentCount}명\n`;
  afternoon += `• 외출: ${outing.length}명`;
  if (outing.length > 0) {
    outing.forEach(({ name, startTime, endTime }) => {
      const endStr = endTime ? endTime : '미복귀';
      afternoon += `\n  ◦ ${name}: ${startTime}~${endStr} 외출`;
    });
  }
  afternoon += `\n• 추가 휴공가: ${leaveList.length}명`;
  if (leaveList.length > 0) {
    leaveList.forEach(item => { afternoon += `\n  ◦ ${item}`; });
  }

  // ── 최종 보고 ──
  const irregular = [];
  late.forEach(({ name, time }) => irregular.push(`${name}(지각 ${time})`));
  outing.forEach(({ name, startTime, endTime }) => {
    const endStr = endTime ? endTime : '미복귀';
    irregular.push(`${name}(외출 ${startTime}~${endStr})`);
  });
  earlyLeave.forEach(({ name, time }) => irregular.push(`${name}(조퇴 ${time})`));

  let final = `${courseLabel}${dateStr} 최종 확정 출결 공유\n`;
  final += `• 출석: ${presentCount}명\n`;
  final += `• 퇴실 QR 미촬영: ${noExitQR.length}명`;
  if (noExitQR.length > 0) {
    noExitQR.forEach(({ name }) => { final += `\n  ◦ ${name}`; });
  }
  final += `\n• 지각/외출/조퇴: ${irregular.length}명`;
  if (irregular.length > 0) {
    irregular.forEach(item => { final += `\n  ◦ ${item}`; });
  }
  final += `\n• 출석입력요청 검토 결과`;
  final += `\n  ◦ 검토 대상: ${reviewCount}건`;
  final += `\n  ◦ 검토 결과: ${reviewResult}`;

  reports = { morning, afternoon, final };
  document.getElementById('report-card').style.display = 'flex';
  switchTab(activeTab);
  setStatus(
    `✅ 분석 완료 — 총 ${total}명 | 출석 ${presentCount}명 | 지각/미입실 ${lateAbsentCount}명 | 외출 ${outing.length}명 | 휴공가 ${leaveList.length}명`,
    'ok'
  );
  document.getElementById('report-card').scrollIntoView({ behavior:'smooth' });
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t => {
    const labels = { morning:'오전', afternoon:'오후', final:'최종' };
    t.classList.toggle('active', t.textContent.includes(labels[tab]));
  });
  document.getElementById('report-text').textContent = reports[tab] || '';
}

function textToHtml(text) {
  const lines = text.split('\n');
  return lines.map((line, i) => {
    const isIndented = line.startsWith('  ');
    const escaped = line.trim()
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;');
    if (i === 0) return `<b>${escaped}</b>`;
    if (isIndented) return `&nbsp;&nbsp;&nbsp;&nbsp;${escaped}`;
    return escaped;
  }).join('<br>');
}

function copyReport() {
  const text = reports[activeTab];
  if (!text) return;

  // rich text(HTML) + plain text 동시에 클립보드에 올리기
  const html = textToHtml(text);
  const div = document.createElement('div');
  div.setAttribute('contenteditable', 'true');
  div.innerHTML = html;
  div.style.position = 'fixed';
  div.style.opacity = '0';
  div.style.left = '-9999px';
  document.body.appendChild(div);

  const selection = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(div);
  selection.removeAllRanges();
  selection.addRange(range);
  document.execCommand('copy');
  document.body.removeChild(div);
  selection.removeAllRanges();

  const el = document.getElementById('copy-done');
  el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 1500);
}

function toggleColMap() {
  document.getElementById('col-map').classList.toggle('show');
}

function clearAll() {
  document.getElementById('paste-area').value = '';
  document.getElementById('file-input').value = '';
  document.getElementById('report-card').style.display = 'none';
  setStatus('');
}

function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (type ? ' ' + type : '');
}

document.getElementById('paste-area').addEventListener('input', () => {
  if (document.getElementById('paste-area').value.trim()) {
    setStatus('데이터 감지됨. 분석하기를 눌러주세요.', '');
  }
});
</script>
