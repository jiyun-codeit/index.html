<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>불시점검 멘트 생성기</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
background: #f7f7f5;
display: flex;
align-items: flex-start;
justify-content: center;
min-height: 100vh;
padding: 2rem 1rem;
}
.card {
background: #fff;
border-radius: 12px;
border: 1px solid #e5e5e3;
padding: 1.75rem;
width: 100%;
max-width: 560px;
}
h1 {
font-size: 16px;
font-weight: 600;
color: #1a1a1a;
margin-bottom: 1.5rem;
display: flex;
align-items: center;
gap: 8px;
}
.row {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 1rem;
flex-wrap: wrap;
}
label {
font-size: 13px;
color: #6b6b6b;
white-space: nowrap;
min-width: 60px;
}
input[type="time"],
input[type="number"] {
font-size: 15px;
padding: 7px 11px;
border: 1px solid #d9d9d6;
border-radius: 8px;
background: #fafafa;
color: #1a1a1a;
outline: none;
transition: border-color 0.15s;
}
input[type="time"]:focus,
input[type="number"]:focus {
border-color: #8b7cf8;
}
input[type="number"] { width: 68px; }
.btn-now {
font-size: 13px;
padding: 7px 14px;
border: 1px solid #d9d9d6;
border-radius: 8px;
background: #fff;
color: #3d3d3d;
cursor: pointer;
display: flex;
align-items: center;
gap: 5px;
transition: background 0.12s;
}
.btn-now:hover { background: #f2f2f0; }
.btn-now svg { width: 14px; height: 14px; }
.message-box {
background: #f7f7f5;
border: 1px solid #e5e5e3;
border-radius: 10px;
padding: 1rem 1.1rem;
font-size: 14px;
line-height: 1.85;
color: #1a1a1a;
white-space: pre-wrap;
word-break: keep-all;
margin: 1.25rem 0 1rem;
min-height: 80px;
}
.footer {
display: flex;
align-items: center;
gap: 10px;
}
.btn-copy {
font-size: 14px;
padding: 8px 18px;
border: 1px solid #d9d9d6;
border-radius: 8px;
background: #fff;
color: #1a1a1a;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
transition: background 0.12s;
}
.btn-copy:hover { background: #f2f2f0; }
.btn-copy svg { width: 15px; height: 15px; }
.copy-done {
font-size: 13px;
color: #22a06b;
opacity: 0;
transition: opacity 0.3s;
}
.offset-label {
font-size: 13px;
color: #6b6b6b;
}
.section-divider {
height: 1px;
background: #e5e5e3;
margin: 1.5rem 0 1.25rem;
}
.section-title {
font-size: 13px;
font-weight: 600;
color: #6b6b6b;
margin-bottom: 0.75rem;
display: flex;
align-items: center;
gap: 6px;
}
.pending-area {
margin-bottom: 0.75rem;
}
.pending-label {
font-size: 11px;
color: #aaa;
margin-bottom: 6px;
}
.pending-chips {
display: flex;
flex-wrap: wrap;
gap: 6px;
min-height: 20px;
}
.chip {
display: inline-flex;
align-items: center;
gap: 5px;
font-size: 13px;
padding: 4px 10px 4px 12px;
border-radius: 20px;
border: 1px solid #d9d9d6;
background: #fff;
color: #1a1a1a;
cursor: pointer;
transition: background 0.12s, border-color 0.12s;
}
.chip:hover { background: #f0eeff; border-color: #8b7cf8; color: #8b7cf8; }
.chip.active { background: #8b7cf8; border-color: #8b7cf8; color: #fff; }
.chip-x {
font-size: 14px;
line-height: 1;
color: inherit;
opacity: 0.6;
cursor: pointer;
margin-left: 2px;
}
.chip-x:hover { opacity: 1; }
</style>
</head>
<body>
<div class="card">
<h1>
<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b7cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
불시점검 안내 멘트
</h1>
<div class="row">
<label>안내 시점</label>
<input type="time" id="base-time" />
<button class="btn-now" onclick="setNow()">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
지금으로
</button>
</div>
<div class="row">
<label>복귀 시간</label>
<span class="offset-label">+</span>
<input type="number" id="offset-min" value="15" min="1" max="60" />
<span class="offset-label">분</span>
</div>
<div class="message-box" id="message-box"></div>
<div class="footer">
<button class="btn-copy" onclick="copyMsg()">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
복사하기
</button>
<span class="copy-done" id="copy-done">복사됨!</span>
</div>
<div class="section-divider"></div>
<div class="section-title">
<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#e5534b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
후속 조치 멘트
</div>
<div class="pending-area">
<div class="pending-label">진행 중 — 초기 멘트 복사 시 자동 추가 (클릭하면 최초 자리비움 시각 반영)</div>
<div class="pending-chips" id="pending-chips"></div>
</div>
<div class="row">
<label>최초 자리비움</label>
<input type="time" id="announcement-time" />
</div>
<div class="row">
<label>후속 시점</label>
<input type="time" id="followup-time" />
<button class="btn-now" onclick="setFollowupNow()">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
지금으로
</button>
</div>
<div class="message-box" id="followup-message-box" style="color:#aaa;font-size:13px;">최초 자리비움과 후속 시점을 입력하면 자동 생성됩니다.</div>
<div class="footer">
<button class="btn-copy" onclick="copyFollowup()">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
복사하기
</button>
<span class="copy-done" id="followup-copy-done">복사됨!</span>
</div>
</div>
<script>
function pad(n) { return String(n).padStart(2, '0'); }
let pendingList = [];
let chipIdCounter = 0;
let activeChipId = null;
function addPending(time) {
  if (pendingList.some(p => p.time === time)) return;
  const id = ++chipIdCounter;
  pendingList.push({ id, time });
  renderChips();
}
function removePending(id) {
  pendingList = pendingList.filter(p => p.id !== id);
  if (activeChipId === id) activeChipId = null;
  renderChips();
}
function selectChip(id) {
  const entry = pendingList.find(p => p.id === id);
  if (!entry) return;
  activeChipId = id;
  document.getElementById('announcement-time').value = entry.time;
  renderChips();
  renderFollowup();
}
function renderChips() {
  const container = document.getElementById('pending-chips');
  if (pendingList.length === 0) { container.innerHTML = ''; return; }
  container.innerHTML = pendingList.map(({ id, time }) => `<span class="chip${activeChipId === id ? ' active' : ''}" onclick="selectChip(${id})">${time}<span class="chip-x" onclick="event.stopPropagation(); removePending(${id})">×</span></span>`).join('');
}
function buildMessage() {
  const inp = document.getElementById('base-time').value;
  const offset = parseInt(document.getElementById('offset-min').value) || 15;
  if (!inp) return '';
  const [h, m] = inp.split(':').map(Number);
  const now = new Date();
  const dateStr = (now.getMonth() + 1) + '/' + pad(now.getDate());
  const baseStr = h + ':' + pad(m);
  const totalMin = h * 60 + m + offset;
  const retStr = Math.floor(totalMin / 60) % 24 + ':' + pad(totalMin % 60);
  return `안녕하세요 00님, ${dateStr}, ${baseStr} 기준으로 수업 참여가 확인되지 않아 안내드립니다.\n${retStr}까지 복귀하지 않으실 경우, ${baseStr}부터 복귀 시점까지 외출로 반영될 수 있습니다.\n복귀시점은 이 DM에 주시는 답장을 기준으로 계산되니 복귀하셨다면 꼭 답장부탁드립니다. (15분 이하 자리비움은 출결에 영향을 주지 않습니다.)`;
}
function render() { document.getElementById('message-box').textContent = buildMessage(); }
function buildFollowupMessage() {
  const fuInp = document.getElementById('followup-time').value;
  const announcementTime = document.getElementById('announcement-time').value;
  if (!announcementTime || !fuInp) return '';
  const now = new Date();
  const dateStr = (now.getMonth() + 1) + '/' + pad(now.getDate());
  return `00님! ${dateStr} ${fuInp}까지 복귀가 확인되지 않아 최초 자리비움 확인된 ${announcementTime} 부터 복귀시점까지 외출로 처리될 예정입니다.\n복귀시점은 이 DM에 주시는 답장을 기준으로 계산되니 복귀하셨다면 꼭 답장 부탁드립니다`;
}
function renderFollowup() {
  const text = buildFollowupMessage();
  const box = document.getElementById('followup-message-box');
  if (text) { box.textContent = text; box.style.color = '#1a1a1a'; box.style.fontSize = '14px'; }
  else { box.textContent = '최초 자리비움과 후속 시점을 입력하면 자동 생성됩니다.'; box.style.color = '#aaa'; box.style.fontSize = '13px'; }
}
function setNow() {
  const now = new Date();
  document.getElementById('base-time').value = pad(now.getHours()) + ':' + pad(now.getMinutes());
  render(); renderFollowup();
}
function setFollowupNow() {
  const now = new Date();
  document.getElementById('followup-time').value = pad(now.getHours()) + ':' + pad(now.getMinutes());
  renderFollowup();
}
function copyMsg() {
  const text = buildMessage();
  if (!text) return;
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  const time = document.getElementById('base-time').value;
  addPending(time);
  const annEl = document.getElementById('announcement-time');
  if (!annEl.value) {
    annEl.value = time;
    activeChipId = pendingList.find(p => p.time === time)?.id || null;
    renderChips();
  }
  renderFollowup();
  const el = document.getElementById('copy-done');
  el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 1500);
}
function copyFollowup() {
  const text = buildFollowupMessage();
  if (!text) return;
  const ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
  const el = document.getElementById('followup-copy-done');
  el.style.opacity = '1'; setTimeout(() => el.style.opacity = '0', 1500);
}
document.getElementById('base-time').addEventListener('input', () => { render(); renderFollowup(); });
document.getElementById('offset-min').addEventListener('input', render);
document.getElementById('announcement-time').addEventListener('input', () => { activeChipId = null; renderChips(); renderFollowup(); });
document.getElementById('followup-time').addEventListener('input', renderFollowup);
setNow();
</script>
</body>
</html>
